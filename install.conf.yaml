- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.zprofile: zprofile
    ~/.zshrc: zshrc
    ~/.config/nvim: nvim
    ~/.config/fish/config.fish:
      path: config.fish
      create: true
    ~/.aerospace.toml:
      if: '[ `uname` = Darwin ]'
      path: .aerospace.toml

- shell:
    - [git submodule update --init --recursive, Installing submodules]
