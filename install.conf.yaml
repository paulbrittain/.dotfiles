- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.zprofile: zprofile
    ~/.zshrc: zshrc
    ~/.config/nvim: nvim
    ~/.config/fish/config.fish:
      path: config.fish
      create: true
    ~/.aerospace.toml:
      if: '[ `uname` = Darwin ]'
      path: .aerospace.toml
    ~/bin/claude-split:
      path: tmux-bin/claude-split.sh
      create: true
    ~/bin/claude-split-pick:
      path: tmux-bin/claude-split-pick.sh
      create: true
    ~/bin/db-creds-crypt:
      path: tmux-bin/db-creds-crypt.sh
      create: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]
